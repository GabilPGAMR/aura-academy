    <div class="auth-container">
        <div class="glass-panel auth-card fade-in">
            <div class="brand-logo">
                <i class="ph-fill ph-planet"></i>
                <span>Aura Academy</span>
            </div>
            
            <h2>Bem-vindo de volta!</h2>
            <p>Faça login para continuar sua jornada de aprendizado e evolução.</p>
            
            <form id="login-form" (submit)="entrar($event)" style="margin-top: 2rem;">
                <div class="form-group" style="text-align: left;">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="aluno@email.com">
                    <span class="form-error"><i class="ph ph-warning-circle"></i> Insira um e-mail válido.</span>
                </div>
                
                <div class="form-group" style="text-align: left;">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••">
                    <span class="form-error"><i class="ph ph-warning-circle"></i> A senha deve ter no mínimo 6 caracteres.</span>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <label style="font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" style="accent-color: var(--primary); width: 16px; height: 16px;">
                        Lembrar de mim
                    </label>
                    <a href="#" style="color: var(--secondary); font-size: 0.85rem; text-decoration: none;">Esqueceu a senha?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;" [disabled]="loading()">
                 @if (loading()) {
                 <i class="ph ph-spinner ph-spin"></i> Autenticando...
                    } @else {
                     Entrar na Plataforma
                <i class="ph ph-sign-in"></i>
                    }
</button>
            </form>
            @if (erro()) {
            <p style="color: var(--danger); margin-bottom: 1rem;">{{ erro() }}</p>
             }
            <p style="margin-top: 2rem; font-size: 0.9rem;">
                Não tem uma conta? <a href="#" style="color: var(--primary); font-weight: 500; text-decoration: none;">Cadastre-se grátis</a>
            </p>
        </div>
    </div>
