
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-logo">
                <i class="ph-fill ph-planet"></i>
                Aura Academy
            </a>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link">
                    <i class="ph ph-squares-four"></i> Dashboard
                </a>
                <a href="cursos.html" class="nav-link">
                    <i class="ph ph-books"></i> Catálogo de Cursos
                </a>
                <a href="novo-curso.html" class="nav-link active">
                    <i class="ph ph-plus-circle"></i> Criar Curso
                </a>
                <a href="perfil.html" class="nav-link">
                    <i class="ph ph-user"></i> Meu Perfil
                </a>
            </nav>

            <div style="margin-top: auto;">
                <a href="index.html" class="nav-link" style="color: var(--danger);">
                    <i class="ph ph-sign-out"></i> Sair
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar fade-in">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass" style="color: var(--text-muted)"></i>
                    <input type="text" placeholder="Buscar no catálogo...">
                </div>
                <div class="user-profile-mini">
                    <img src="https://i.pravatar.cc/150?img=68" alt="User Avatar" class="avatar">
                </div>
            </header>

            <div class="fade-in" style="animation-delay: 0.1s;">
                <h2>Criar Novo Curso</h2>
                <p style="margin-bottom: 2rem;">Preencha as informações para adicionar um novo curso ao catálogo.</p>

                <div class="glass-panel" style="padding: 2.5rem; max-width: 800px;">
                    <form id="course-form">
                        <div class="form-group">
                            <label for="course-title">Título do Curso</label>
                            <input type="text" id="course-title" class="form-control" placeholder="Ex: MasterClass Javascript Moderno">
                            <span class="form-error"><i class="ph ph-warning-circle"></i> O título é obrigatório.</span>
                        </div>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                            <div class="form-group">
                                <label for="course-category">Categoria</label>
                                <select id="course-category" class="form-control" style="appearance: none; cursor: pointer; color: white;">
                                    <option value="" style="color: black;">Selecione...</option>
                                    <option value="design" style="color: black;">Design & UX</option>
                                    <option value="dev" style="color: black;">Desenvolvimento</option>
                                    <option value="business" style="color: black;">Negócios e Gestão</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="course-price">Preço (R$)</label>
                                <input type="number" id="course-price" class="form-control" placeholder="0 para Grátis">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="course-desc">Descrição do Curso</label>
                            <textarea id="course-desc" class="form-control" rows="4" placeholder="Descreva os objetivos e o conteúdo deste curso..." style="resize: vertical;"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Capa do Curso</label>
                            <div style="border: 2px dashed var(--surface-border); padding: 2rem; border-radius: var(--radius-sm); text-align: center; color: var(--text-muted); cursor: pointer; transition: var(--transition); background: rgba(0,0,0,0.1);" onmouseover="this.style.borderColor='var(--primary)'" onmouseout="this.style.borderColor='var(--surface-border)'">
                                <i class="ph ph-upload-simple" style="font-size: 2rem; margin-bottom: 0.5rem; color: var(--primary);"></i>
                                <p>Arraste uma imagem ou clique para fazer upload</p>
                                <span style="font-size: 0.8rem;">(Formatos suportados: JPG, PNG)</span>
                            </div>
                        </div>

                        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                            <button type="button" class="btn btn-outline" onclick="window.history.back()">Cancelar</button>
                            <button type="submit" class="btn btn-primary">
                                <i class="ph ph-paper-plane-right"></i> Publicar Curso
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
